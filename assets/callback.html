<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signed in — PingOne + Twilio Verify Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 1rem 0;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1.25rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state p { color: #666; font-size: 0.95rem; }

    /* Success state */
    .success-state { display: none; }

    .success-icon {
      width: 52px; height: 52px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.5rem;
    }

    h1 { font-size: 1.35rem; font-weight: 700; text-align: center; margin-bottom: 0.3rem; }
    .subtitle { text-align: center; color: #666; font-size: 0.88rem; margin-bottom: 1.75rem; }

    .claims {
      background: #f9f9fb;
      border-radius: 8px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.5rem;
    }

    .claim-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid #eee;
      font-size: 0.88rem;
    }

    .claim-row:last-child { border-bottom: none; }

    .claim-label {
      color: #888;
      min-width: 90px;
      font-size: 0.8rem;
      padding-top: 1px;
    }

    .claim-value { color: #111; word-break: break-all; }

    .mfa-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 0.25rem;
    }

    .try-again {
      text-align: center;
      margin-top: 0.5rem;
    }

    .try-again a {
      color: #1a56db;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .try-again a:hover { text-decoration: underline; }

    /* Error state */
    .error-state { display: none; text-align: center; }

    .error-icon {
      width: 52px; height: 52px;
      background: #fde8e8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.5rem;
    }

    .error-message {
      background: #fff3f3;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: #c0392b;
      margin: 1rem 0 1.5rem;
      text-align: left;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Completing sign-in…</p>
    </div>

    <!-- Success -->
    <div class="success-state" id="successState">
      <div class="success-icon">✓</div>
      <h1>Signed in</h1>
      <p class="subtitle">Authentication complete. MFA was verified via Twilio Verify.</p>

      <div class="claims" id="claims"></div>

      <div class="try-again">
        <a href="/index.html">← Sign in as a different user</a>
      </div>
    </div>

    <!-- Error -->
    <div class="error-state" id="errorState">
      <div class="error-icon">✕</div>
      <h1>Sign-in failed</h1>
      <div class="error-message" id="errorMessage"></div>
      <div class="try-again">
        <a href="/index.html">← Try again</a>
      </div>
    </div>

  </div>

  <script>
    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorMessage').textContent = msg;
      document.getElementById('errorState').style.display = 'block';
    }

    function showSuccess(claims) {
      document.getElementById('loadingState').style.display = 'none';

      const rows = [
        { label: 'Name',  value: claims.name || [claims.given_name, claims.family_name].filter(Boolean).join(' ') || '—' },
        { label: 'Email', value: claims.email || '—' },
        { label: 'Phone', value: claims.phone_number || sessionStorage.getItem('login_phone') || '—' },
        { label: 'Subject', value: claims.sub || '—' },
      ];

      const claimsEl = document.getElementById('claims');
      rows.forEach(({ label, value }) => {
        const row = document.createElement('div');
        row.className = 'claim-row';
        row.innerHTML = `<span class="claim-label">${label}</span><span class="claim-value">${escapeHtml(value)}</span>`;
        claimsEl.appendChild(row);
      });

      // MFA badge
      const mfaRow = document.createElement('div');
      mfaRow.className = 'claim-row';
      mfaRow.innerHTML = `<span class="claim-label">MFA</span><span class="claim-value"><span class="mfa-badge">✓ Verified via Twilio Verify</span></span>`;
      claimsEl.appendChild(mfaRow);

      document.getElementById('successState').style.display = 'block';

      // Clean up session storage
      sessionStorage.removeItem('pkce_verifier');
      sessionStorage.removeItem('pkce_state');
      sessionStorage.removeItem('login_email');
      sessionStorage.removeItem('login_phone');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const errorParam = params.get('error');

      if (errorParam) {
        showError(`PingOne returned an error: ${params.get('error_description') || errorParam}`);
        return;
      }

      if (!code) {
        showError('No authorization code received from PingOne. Did you arrive here directly?');
        return;
      }

      const storedState = sessionStorage.getItem('pkce_state');
      if (storedState && state !== storedState) {
        showError('State mismatch — possible CSRF. Please sign in again.');
        return;
      }

      const codeVerifier = sessionStorage.getItem('pkce_verifier');
      if (!codeVerifier) {
        showError('No PKCE verifier found. Please sign in again.');
        return;
      }

      // Derive redirect_uri from current location (must match what was sent to /authorize)
      const redirectUri = window.location.origin + '/callback.html';

      try {
        const res = await fetch('/token-exchange', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, code_verifier: codeVerifier, redirect_uri: redirectUri }),
        });

        const data = await res.json();
        if (!res.ok) {
          showError(data.error || `Token exchange failed (${res.status})`);
          return;
        }

        showSuccess(data);
      } catch (err) {
        showError('Unexpected error: ' + err.message);
      }
    }

    handleCallback();
  </script>
</body>
</html>
